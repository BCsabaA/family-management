{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mobile-card">
            <div class="card-body">
                <h3 class="card-title mb-4">Gyors rögzítés</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Tranzakció típusa</label>
                        <select name="type" id="type_select" class="form-select border-primary text-primary fw-bold">
                            <option value="income" {% if (tx.type if tx else 'income') == 'income' %}selected{% endif %}>BEVÉTEL (+)</option>
                            <option value="transfer" {% if (tx.type if tx else 'transfer') == 'transfer' %}selected{% endif %}>ÁTTÁROLÁS (A -> B)</option>
                            <option value="expense" {% if (tx.type if tx else 'expense') == 'expense' %}selected{% endif %}>KIADÁS (-)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Dátum</label>
                        <input type="date" name="date" class="form-control form-control-lg" value="{{ today }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Összeg (Ft)</label>
                        <input type="number" name="amount" class="form-control form-control-lg" placeholder="0" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Helyszín</label>
                        <select name="location_id" class="form-select">
                            <option value="">Válassz helyszínt (opcionális)</option>
                            {% for loc in locations %}
                            <option value="{{ loc.id }}">{{ loc.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kategória</label>
                        <select name="category_id" id="category_select" class="form-select form-select-lg">
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Zseb (Fizetési mód)</label>
                        <select name="wallet_id" class="form-select form-select">
                            {% for wallet in wallets %}
                            <option value="{{ wallet.id }}" 
                                {% if wallet.id == default_wallet_id %} selected {% endif %}>
                            {{ wallet.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div id="to_wallet_section" class="mb-3 d-none">
                        <label class="form-label text-success">Cél zseb (Hová érkezik a pénz?)</label>
                        <select name="to_wallet_id" class="form-select border-success">
                            <option value="">-- Válassz cél zsebet --</option>
                            {% for w in wallets %}
                            <option value="{{ w.id }}" {% if (tx.to_wallet_id if tx else None) == w.id %}selected{% endif %}>{{ w.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Mentés most</button>
                        <a href="/" class="btn btn-outline-secondary">Mégse</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Dinamikusan elrejtjük vagy mutatjuk a cél zsebet
document.getElementById('type_select').addEventListener('change', function() {
    const type = this.value;
    const toWalletSection = document.getElementById('to_wallet_section');
    const locationSection = document.getElementById('location_section'); // Adj ID-t a helyszín div-nek
    const categorySection = document.getElementById('category_section'); // Adj ID-t a kategória div-nek

    // Alapértelmezett: minden látszik
    toWalletSection.classList.add('d-none');
    locationSection.classList.remove('d-none');
    categorySection.classList.remove('d-none');

    if (type === 'transfer') {
        toWalletSection.classList.remove('d-none');
        locationSection.classList.add('d-none'); // Áttárolásnál nincs helyszín
        categorySection.classList.add('d-none'); // Áttárolásnál nincs kategória
    } else if (type === 'income') {
        toWalletSection.classList.remove('d-none'); // Bevételnél a cél zseb kell
        categorySection.classList.add('d-none');    // Bevételnél általában nincs kategória
        // A helyszín maradhat, ha tudni akarjuk honnan jött (pl. "Cég neve")
    }
});

document.addEventListener('DOMContentLoaded', function() {
    // 1. Az adatok precíz generálása
    const locationDefaults = {
        {% for loc in locations %}
            {% if loc.default_category_id %}
            "{{ loc.id }}": "{{ loc.default_category_id }}"{% if not loop.last %},{% endif %}
            {% endif %}
        {% endfor %}
    };

    const locationSelect = document.querySelector('select[name="location_id"]');
    const categorySelect = document.getElementById('category_select');

    if (locationSelect && categorySelect) {
        locationSelect.addEventListener('change', function() {
            const locId = this.value;
            const catId = locationDefaults[locId];
            
            if (catId) {
                categorySelect.value = catId;
            }
        });
    } else {
        // Ha mobilon vagy, ez segíthet látni, ha nem találja a mezőket
        alert("Hiba: Nem találom a select mezőket!");
    }
});
</script>


{% endblock %}
