{% extends 'layout.html' %}

{% block content %}
<div class="card mobile-card">
    <div class="card-body">
        <h3><i class="bi bi-pencil-square"></i> Tranzakció szerkesztése</h3>
        <form method="POST">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label">Dátum</label>
                    <input type="date" name="date" class="form-control" value="{{ tx.date.strftime('%Y-%m-%d') }}">
                </div>
                <div class="col-6">
                    <label class="form-label">Összeg (Összesen)</label>
                    <input type="number" name="total_amount" class="form-control" value="{{ tx.total_amount }}" step="0.01">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Helyszín és Zseb</label>
                <div class="input-group">
                    <select name="location_id" class="form-select">
                        {% for loc in locations %}
                        <option value="{{ loc.id }}" {% if tx.location_id == loc.id %}selected{% endif %}>{{ loc.name }}</option>
                        {% endfor %}
                    </select>
                    <select name="wallet_id" class="form-select">
                        {% for w in wallets %}
                        <option value="{{ w.id }}" {% if tx.wallet_id == w.id %}selected{% endif %}>{{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <hr>
            <h5>Tételek (Bontás)</h5>
            {% for item in tx.items %}
            <div class="bg-light p-2 rounded mb-3 border">
                <div class="row g-2 mb-2">
                    <div class="col-4">
                        <input type="number" name="item_amount_{{ item.id }}" class="form-control form-control-sm" value="{{ item.amount }}" step="0.01">
                    </div>
                    <div class="col-8">
                        <select name="item_category_{{ item.id }}" class="form-select form-select-sm">
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if item.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="mb-2">
                    <select name="item_project_{{ item.id }}" class="form-select form-select-sm">
                        <option value="">-- Nincs projekt --</option>
                        {% for p in projects %}
                        <option value="{{ p.id }}" {% if item.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-2">
                    <label class="small text-muted d-block">Címkék:</label>
                    <div id="tag-container-{{ item.id }}" class="mb-2">
                        {% for t in item.tags %}
                        <span class="badge bg-secondary me-1">
                            {{ t.name }} 
                            <input type="hidden" name="item_tags_{{ item.id }}" value="{{ t.id }}">
                            <i class="bi bi-x-circle cursor-pointer" onclick="this.parentElement.remove()"></i>
                        </span>
                        {% endfor %}
                    </div>
                    <select class="form-select form-select-sm" onchange="addTag(this, {{ item.id }})">
                        <option value="">+ Címke hozzáadása</option>
                        {% for t in tags %}
                        <option value="{{ t.id }}">{{ t.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            {% endfor %}

            <div class="p-2 border border-primary border-dashed rounded mb-3">
                <label class="small text-primary">Új tétel hozzáadása (Bontás)</label>
                <div class="row g-2">
                    <div class="col-4">
                        <input type="number" name="new_item_amount" class="form-control form-control-sm" placeholder="Összeg">
                    </div>
                    <div class="col-8">
                        <select name="new_item_category" class="form-select form-select-sm">
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success">Módosítások mentése</button>
                <a href="{{ url_for('index') }}" class="btn btn-light">Mégse</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}

<script>
function addTag(select, itemId) {
    if(!select.value) return;
    const container = document.getElementById(`tag-container-${itemId}`);
    const tagName = select.options[select.selectedIndex].text;
    const tagId = select.value;

    // Ellenőrizzük, ne legyen duplikáció
    if (container.querySelector(`input[value="${tagId}"]`)) return;

    const span = document.createElement('span');
    span.className = 'badge bg-secondary me-1';
    span.innerHTML = `${tagName} <input type="hidden" name="item_tags_${itemId}" value="${tagId}"> <i class="bi bi-x-circle cursor-pointer" onclick="this.parentElement.remove()"></i>`;
    container.appendChild(span);
    select.value = "";
}

document.querySelector('form').addEventListener('submit', function(e) {
    // 1. Megkeressük a főösszeget
    const totalAmount = parseFloat(document.querySelector('input[name="total_amount"]').value) || 0;
    
    // 2. Összeadjuk a meglévő tételek összegeit
    let itemsSum = 0;
    // Minden olyan inputot nézünk, aminek a neve 'item_amount_' kezdetű
    const itemInputs = document.querySelectorAll('input[name^="item_amount_"]');
    itemInputs.forEach(input => {
        itemsSum += parseFloat(input.value) || 0;
    });

    // 3. Hozzáadjuk az esetleges új tétel (bontás) összegét is
    const newAmount = parseFloat(document.querySelector('input[name="new_item_amount"]').value) || 0;
    itemsSum += newAmount;

    // 4. Ellenőrzés: kerekítési hibák elkerülése (0.01 pontosság)
    if (Math.abs(totalAmount - itemsSum) > 0.01) {
        e.preventDefault(); // Megállítjuk a form beküldését
        alert(`Hiba: A tételek összege (${itemsSum} Ft) nem egyezik a tranzakció főösszegével (${totalAmount} Ft)! \n\nKérlek, javítsd az összegeket a mentés előtt.`);
    }
});
</script>
